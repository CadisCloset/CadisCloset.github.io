<!DOCTYPE html>
<html>
<head>
    <title>Cadis Closet</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
        }
        .producto {
            background: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
            width: 260px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
        button {
            background: black;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Cadis Closet</h1>
    <p>Ropa con estilo 🔥</p>

    <div class="producto">
        <img src="https://via.placeholder.com/250" alt="Camiseta">
        <h2>Camiseta</h2>
        <p>Precio: 15€</p>
        <button onclick="window.location.href='https://wa.me/34600000000'">
            Comprar por WhatsApp
        </button>
    </div>

    <div class="producto">
        <img src="https://via.placeholder.com/250" alt="Sudadera">
        <h2>Sudadera</h2>
        <p>Precio: 30€</p>
        <button onclick="window.location.href='https://wa.me/34600000000'">
            Comprar por WhatsApp
        </button>
    </div>

</body>
</html>
